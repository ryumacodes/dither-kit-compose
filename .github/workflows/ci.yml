name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  desktop-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Check formatting
        run: ./gradlew spotlessCheck
      - name: Test desktop and compile Android
        run: ./gradlew :dither-kit-compose:desktopTest :dither-kit-compose:compileAndroidMain

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Compile iOS library and sample
        run: >-
          ./gradlew
          :dither-kit-compose:compileKotlinIosSimulatorArm64
          :sample:shared:compileKotlinIosSimulatorArm64
